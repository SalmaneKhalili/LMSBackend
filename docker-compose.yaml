version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: lms-postgres
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lms-network

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      CONFIG_REPO_URI: file:///config-repo
    volumes:
      - ./config-repo:/config-repo   # mount your local git repo
    networks:
      - lms-network
    depends_on:
      - postgres   # not needed but keeps order

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
    networks:
      - lms-network
    depends_on:
      - config-server

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - lms-network
    depends_on:
      - config-server
      - eureka-server

networks:
  lms-network:
    driver: bridge

volumes:
  postgres_data: